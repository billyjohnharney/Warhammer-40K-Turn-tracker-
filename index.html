<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Angels — Turn Tracker</title>
<link rel="manifest" href="./warhammer-manifest.json">
<link rel="icon" href="./warhammer-icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#1a6b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DA Tracker">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111214;
    --panel: #16181c;
    --border: #2a2d35;
    --border-bright: #3d4250;
    --green: #1a6b2e;
    --green-bright: #25a044;
    --green-glow: #2ecc71;
    --gold: #c9a84c;
    --gold-dim: #7a6430;
    --red: #8b1a1a;
    --red-bright: #c0392b;
    --text: #c8cdd8;
    --text-dim: #5a6070;
    --text-bright: #e8ecf4;
    --highlight: #1e2940;
    --highlight-border: #2a3d6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--black);
    color: var(--text);
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(26,107,46,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0d1a10 0%, var(--dark) 100%);
    border-bottom: 1px solid var(--green);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }

  .header-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .title-block h1 {
    font-family: Arial, sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--green-glow);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(46,204,113,0.3);
  }

  .title-block p {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-block {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 120px;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-value {
    font-family: Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    min-width: 30px;
    text-align: center;
  }

  .stat-btn {
    background: var(--border);
    border: 1px solid var(--border-bright);
    color: var(--text);
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: Arial, sans-serif;
  }

  .stat-btn:hover {
    background: var(--green);
    border-color: var(--green-bright);
    color: white;
  }

  .stat-btn.minus:hover {
    background: var(--red);
    border-color: var(--red-bright);
  }

  /* TURN INDICATOR */
  .turn-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
  }

  .turn-bar-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .phase-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .phase-pill {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .phase-pill.active {
    border-color: var(--green-bright);
    color: var(--green-glow);
    background: rgba(37,160,68,0.1);
    box-shadow: 0 0 8px rgba(46,204,113,0.15);
  }

  .phase-pill.done {
    border-color: var(--green);
    color: var(--green);
    background: rgba(26,107,46,0.08);
  }

  /* RESET BUTTON */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 6px 16px;
    font-family: Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }

  /* MAIN CONTENT */
  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* PHASE VIEW (flat — no card) */
  .phase-view {
    padding: 0 0 16px;
  }

  .phase-view-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--green);
    margin-bottom: 4px;
  }

  .phase-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .phase-number {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-width: 24px;
  }

  .phase-title {
    font-family: Arial, sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green-glow);
    text-shadow: 0 0 12px rgba(46,204,113,0.25);
  }

  .phase-progress {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 8px 10px 4px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .check-item:hover {
    background: rgba(255,255,255,0.02);
  }

  .check-item.checked {
    opacity: 0.5;
    border-left-color: var(--green);
  }

  .check-item.checked .item-text {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  /* KEYWORD HIGHLIGHT */
  .check-item.has-keyword {
    border-left-color: rgba(201,168,76,0.3);
  }

  .check-item.has-keyword:hover {
    background: rgba(201,168,76,0.03);
  }

  .check-item.checked.has-keyword {
    border-left-color: var(--green);
  }

  .checkbox {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border-bright);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--black);
  }

  .check-item:hover .checkbox {
    border-color: var(--green-bright);
  }

  .check-item.checked .checkbox {
    background: var(--green);
    border-color: var(--green-bright);
  }

  .checkbox::after {
    content: '✓';
    font-size: 9px;
    color: white;
    display: none;
  }

  .check-item.checked .checkbox::after {
    display: block;
  }

  .item-content {
    flex: 1;
  }

  .item-text {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  /* KEYWORD TAGS */
  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }

  .keyword-tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
    cursor: pointer;
    transition: all 0.15s;
  }

  .keyword-tag:hover {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    box-shadow: 0 0 6px rgba(201,168,76,0.2);
  }

  /* SUB-ITEMS */
  .sub-items {
    padding-left: 26px;
    border-left: 1px solid var(--border);
    margin-left: 32px;
    margin-top: 2px;
  }

  .sub-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 16px 5px 0;
    cursor: pointer;
    transition: background 0.1s;
  }

  .sub-item:hover { background: rgba(255,255,255,0.02); }

  .sub-item.checked { opacity: 0.5; }
  .sub-item.checked .item-text { text-decoration: line-through; color: var(--text-dim); }

  .sub-checkbox {
    width: 10px;
    height: 10px;
    border: 1px solid var(--border-bright);
    flex-shrink: 0;
    margin-top: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--black);
    transition: all 0.15s;
  }

  .sub-item.checked .sub-checkbox {
    background: var(--green);
    border-color: var(--green-bright);
  }

  .sub-checkbox::after {
    content: '✓';
    font-size: 7px;
    color: white;
    display: none;
  }

  .sub-item.checked .sub-checkbox::after { display: block; }

  /* KEYWORD TOOLTIP PANEL */
  .keyword-panel {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--gold);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.1);
    z-index: 200;
    display: none;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .keyword-panel.visible { display: block; }

  .keyword-panel-header {
    background: rgba(201,168,76,0.1);
    border-bottom: 1px solid var(--gold-dim);
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .keyword-panel-name {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .keyword-panel-close {
    cursor: pointer;
    color: var(--gold);
    font-size: 16px;
    line-height: 1;
    background: none;
    border: none;
    font-family: Arial, sans-serif;
  }

  .keyword-panel-body {
    padding: 12px 14px;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
  }

  .keyword-panel-body .rule-line {
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
  }

  .keyword-panel-body .rule-line:last-child { border-bottom: none; }

  /* SECTION DIVIDERS */
  .section-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 20px 4px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  /* PHASE NAVIGATION ROW */
  .phase-nav-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px 4px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .phase-nav-arrow {
    background: transparent;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    padding: 6px 14px;
    font-family: Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .phase-nav-arrow:hover {
    border-color: var(--green-bright);
    color: var(--green-glow);
  }

  .phase-nav-arrow--next {
    border-color: var(--green);
    color: var(--green-bright);
  }

  .phase-nav-arrow--next:hover {
    background: rgba(37,160,68,0.1);
    box-shadow: 0 0 8px rgba(46,204,113,0.15);
  }

  /* SCROLL INDICATOR */
  .scroll-hint {
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 16px;
    text-transform: uppercase;
  }
</style>

</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>Dark Angels</h1>
      <p>10th Edition — Turn Tracker</p>
    </div>
    <div class="stats-bar">
      <div class="stat-block">
        <div>
          <div class="stat-label">Command Pts</div>
          <div class="stat-controls">
            <button class="stat-btn minus" onclick="adjustStat('cp', -1)">−</button>
            <div class="stat-value" id="cp-display">0</div>
            <button class="stat-btn" onclick="adjustStat('cp', 1)">+</button>
          </div>
        </div>
      </div>
      <div class="stat-block">
        <div>
          <div class="stat-label">Victory Pts</div>
          <div class="stat-controls">
            <button class="stat-btn minus" onclick="adjustStat('vp', -1)">−</button>
            <div class="stat-value" id="vp-display">0</div>
            <button class="stat-btn" onclick="adjustStat('vp', 1)">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="turn-bar">
  <div class="turn-bar-inner">
    <div class="phase-pills" id="phase-pills"></div>
    <button class="reset-btn" onclick="resetTurn()">↺ New Turn</button>
  </div>
</div>

<main>
  <div id="phases-container"></div>
  <div class="scroll-hint">Click any keyword tag to see its rules</div>
</main>

<!-- Keyword Info Panel -->
<div class="keyword-panel" id="keyword-panel">
  <div class="keyword-panel-header">
    <span class="keyword-panel-name" id="kp-name"></span>
    <button class="keyword-panel-close" onclick="closeKeywordPanel()">✕</button>
  </div>
  <div class="keyword-panel-body" id="kp-body"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let stats = { cp: 0, vp: 0 };
let checked = {};
let activePhaseIndex = 0;

// ─── KEYWORD DEFINITIONS ─────────────────────────────────
const keywords = {

  // ══ WEAPON ABILITIES ══════════════════════════════════════════════════════

  'ANTI-[KEYWORD] X+': [
    'Against targets with the matching keyword, an unmodified Wound roll of X+ scores a Critical Wound.',
    'Critical Wounds bypass Toughness — the wound automatically succeeds regardless of target\'s T.',
    'e.g. Anti-Infantry 4+ scores a Critical Wound vs INFANTRY on a 4+. Pairs powerfully with Devastating Wounds.'
  ],
  'ASSAULT': [
    'Can shoot even if the bearer\'s unit Advanced this turn.',
    'If the unit Advanced and shoots, it may only use Assault weapons that turn.'
  ],
  'BLAST': [
    'Add +1 to Attacks for every 5 models in the target unit (round down).',
    'Cannot target units within Engagement Range of any friendly units.'
  ],
  'DEVASTATING WOUNDS': [
    'A Critical Wound (unmodified 6 to wound, or triggered by Anti-) bypasses all saves — including invulnerable.',
    'Inflicts mortal wounds equal to the weapon\'s Damage instead of normal damage.',
    'Note: auto-wounds from Lethal Hits are NOT Critical Wounds and do not trigger Devastating Wounds.'
  ],
  'EXTRA ATTACKS': [
    'Attack with this weapon in addition to one other selected melee weapon.',
    'The number of attacks with this weapon cannot be modified by any rule.'
  ],
  'HAZARDOUS': [
    'After shooting or fighting, roll 1D6 per Hazardous weapon used.',
    'On a 1: CHARACTER, VEHICLE, or MONSTER suffers 3 mortal wounds; otherwise one model is destroyed.',
    'In an Attached unit, mortal wounds from Hazardous are allocated to the Character model, not bodyguards.'
  ],
  'HEAVY': [
    'If the bearer\'s unit Remained Stationary this turn, add +1 to Hit rolls.'
  ],
  'IGNORES COVER': [
    'Attacks from this weapon ignore Benefit of Cover — targets cannot apply the +1 save from Light or Dense Cover.'
  ],
  'INDIRECT FIRE': [
    'Can target units not visible to the attacking model.',
    'If no models in the target are visible: -1 to Hit rolls and target has Benefit of Cover.'
  ],
  'LANCE': [
    'If the bearer\'s unit made a Charge move this turn, add +1 to Wound rolls.'
  ],
  'LETHAL HITS': [
    'A Critical Hit (unmodified 6 to hit) automatically wounds — no Wound roll is made.',
    'This auto-wound is NOT a Critical Wound and does not trigger Devastating Wounds.'
  ],
  'MELTA X': [
    'When targeting a unit within half the weapon\'s range, increase Damage by X.',
    'e.g. Melta 2 with D6 Damage = D6+2 at half range.'
  ],
  'ONE SHOT': [
    'This weapon can only be fired once per battle.',
    'Track usage — after firing it cannot be used again for the rest of the game.'
  ],
  'PISTOL': [
    'Can shoot while within Engagement Range of enemies.',
    'Must target one of the enemy units in Engagement Range.',
    'Cannot mix with non-Pistol weapons when shooting (unless the model is a MONSTER or VEHICLE).'
  ],
  'PRECISION': [
    'When an attack wounds an Attached unit, the attacker may allocate it to any visible CHARACTER in that unit.',
    'Allocate all Precision attacks that wound before making any saving throws.'
  ],
  'PSYCHIC': [
    'This attack or ability counts as a Psychic Attack.',
    'No separate Psychic phase — Psychic weapons are used during Shooting or Fight phases like any other weapon.',
    'Any model armed with a Psychic weapon can use it regardless of whether it has the PSYKER keyword.'
  ],
  'RAPID FIRE X': [
    'When targeting a unit within half the weapon\'s range, increase Attacks by X.',
    'e.g. Rapid Fire 1 at half range = +1 Attack.'
  ],
  'SUSTAINED HITS X': [
    'A Critical Hit (unmodified 6 to hit) scores X additional hits.',
    'e.g. Sustained Hits 2: each Critical Hit generates 2 extra hits that then wound normally.'
  ],
  'TORRENT': [
    'Attacks automatically hit — no Hit roll required.',
    'Wound rolls, saving throws, and damage are still resolved normally.'
  ],
  'TWIN-LINKED': [
    'You may re-roll the Wound roll for each attack made with this weapon.'
  ],

  // ══ UNIT ABILITIES ════════════════════════════════════════════════════════

  'BATTLE-SHOCK': [
    'Tested in Command phase for each unit Below Half-strength: roll 2D6 vs Leadership.',
    'If failed, unit is Battle-shocked until next Command phase: OC becomes 0, cannot use Stratagems.',
    'Battle-shocked units must take Desperate Escape tests (D6 per model, 1-2 = destroyed) when Falling Back.'
  ],
  'DEADLY DEMISE X': [
    'When this model is destroyed, roll 1D6 before removing it.',
    'On a 6, every unit within 6" suffers X mortal wounds.',
    'Models disembarking a destroyed Transport are not affected; instead roll D6 per model — on a 1, that unit suffers 1 mortal wound.'
  ],
  'DEEP STRIKE': [
    'Unit can be held in Reserves and deployed during the Reinforcements step of any Movement phase.',
    'Every model must be placed more than 9" horizontally from all enemy models on arrival.',
    'Cannot arrive in Battle Round 1 in standard matched play unless a specific rule overrides this.'
  ],
  'FEEL NO PAIN X+': [
    'Each time this model would lose a wound (including from mortal wounds), roll 1D6.',
    'On X or higher, that wound is not lost. Roll separately for each wound.',
    'Common values: 4+, 5+, 6+. Resolved after all other saves.'
  ],
  'FIGHTS FIRST': [
    'Unit fights in the Fights First step of the Fight phase.',
    'All units that made a Charge move this turn also gain Fights First until end of turn.',
    'Defending player selects eligible Fights First units before the active player.'
  ],
  'FIGHTS LAST': [
    'Unit fights after all units without Fights Last have fought in Remaining Combats.',
    'Fight order: Fights First → Remaining Combats → Fights Last.',
    'If multiple Fights Last units remain, the active player chooses the order.'
  ],
  'FIRING DECK X': [
    'When this TRANSPORT shoots, it can make additional attacks using up to X weapons from embarked models.',
    'The transport makes these attacks — rules affecting the transport apply, not the embarked model\'s rules.',
    'Cannot be used for Overwatch or other out-of-phase shooting.'
  ],
  'HOVER': [
    'Declare Hover mode at the start of the battle or when deployed. Lasts the rest of the battle.',
    'While in Hover mode: Move becomes 20" and the AIRCRAFT keyword and all Aircraft movement rules are lost.',
    'Hover models deploy and operate like standard units — not automatically placed in Reserves.'
  ],
  'INFILTRATORS': [
    'Set up during Deployment anywhere more than 9" from the enemy deployment zone and all enemy models.',
    'Cannot be placed in Reserves — they deploy directly onto the battlefield.',
    'If both players have Infiltrators, the first player deploys theirs first, then players alternate.'
  ],
  'LEADER': [
    'Before the battle, this CHARACTER can attach to one of its listed Bodyguard units, forming an Attached unit.',
    'While Attached: wounds allocated to Bodyguard first; CHARACTER uses Bodyguard\'s Toughness.',
    'Once all Bodyguard models are destroyed, the CHARACTER operates as a standalone unit.'
  ],
  'LONE OPERATIVE': [
    'Cannot be selected as a ranged attack target unless the attacking model is within 12".',
    'Does not affect melee targeting.'
  ],
  'OBJECTIVE SECURED': [
    'While this unit is on an objective, it controls it even if an enemy unit is also present.',
    'If both sides have ObjSec units on the same objective, the player with more ObjSec models controls it.',
    'Battle-shocked units\' OC is 0 and cannot contribute to objective control.'
  ],
  'SCOUTS X"': [
    'Before the first battle round begins (after deployment), this unit can make a Normal Move of up to X".',
    'Cannot end within Engagement Range of enemy units. Cannot declare a Charge in the first battle round.',
    'First player moves their Scouts units first; players then alternate.'
  ],
  'SMOKE': [
    'Unit keyword that enables the Smokescreen Core Stratagem (1 CP).',
    'When triggered in the opponent\'s Shooting phase: this unit gains Benefit of Cover and Stealth until end of phase.'
  ],
  'STEALTH': [
    'Enemy units targeting this unit from more than 12" away suffer -1 to Hit rolls.',
    'Subject to the standard modifier cap — maximum -1 total penalty from all sources combined.'
  ],

  // ══ VEHICLE / MONSTER SPECIAL RULES ══════════════════════════════════════

  'ATTACHED UNIT': [
    'A unit containing a LEADER — the Character and Bodyguard are treated as a single unit.',
    'Wounds are always allocated to Bodyguard models until all are destroyed.',
    'Characters can only be singled out via the Precision weapon ability while Bodyguard remain.'
  ],
  'DAMAGED: X WOUNDS REMAINING': [

// ─── RENDER ──────────────────────────────────────────────
function render() {
  renderStats();
  renderPills();
  renderPhases();
}

function renderStats() {
  document.getElementById('cp-display').textContent = stats.cp;
  document.getElementById('vp-display').textContent = stats.vp;
}

function renderPills() {
  const container = document.getElementById('phase-pills');
  container.innerHTML = phases.map((p, i) => {
    const total = p.items.length;
    const done = p.items.filter((_, j) => checked[`${p.id}-${j}`]).length;
    const isComplete = done === total;
    const cls = isComplete ? 'done' : i === activePhaseIndex ? 'active' : '';
    return `<div class="phase-pill ${cls}" onclick="goToPhase(${i})">${p.title.split('—')[0].trim().replace(' Phase','').replace(' of Turn','')}</div>`;
  }).join('');
}

function renderPhases() {
  const container = document.getElementById('phases-container');
  const pi = activePhaseIndex;
  const phase = phases[pi];
  const total = phase.items.length;
  const done = phase.items.filter((_, j) => checked[`${phase.id}-${j}`]).length;
  const isComplete = done === total;

  container.innerHTML = `
    <div class="phase-view" id="phase-${phase.id}">
      <div class="phase-view-header">
        <div class="phase-header-left">
          <span class="phase-number">${String(pi + 1).padStart(2,'0')}</span>
          <span class="phase-title">${phase.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="phase-progress">${done}/${total}</span>
          ${isComplete ? '<span style="color:var(--green-glow);font-size:11px;letter-spacing:1px">✓ DONE</span>' : ''}
        </div>
      </div>
      ${phase.items.map((item, j) => {
        const key = `${phase.id}-${j}`;
        const isChecked = checked[key];
        const hasKw = item.keywords && item.keywords.length > 0;
        return `
          <div class="check-item ${isChecked ? 'checked' : ''} ${hasKw ? 'has-keyword' : ''}" onclick="toggleCheck('${phase.id}',${j})">
            <div class="checkbox"></div>
            <div class="item-content">
              <div class="item-text">${item.text}</div>
              ${hasKw ? `<div class="keyword-tags">${item.keywords.map(kw =>
                `<span class="keyword-tag" onclick="event.stopPropagation();showKeyword('${kw}')">${kw}</span>`
              ).join('')}</div>` : ''}
            </div>
          </div>`;
      }).join('')}
      <div class="phase-nav-row">
        ${pi > 0 ? `<button class="phase-nav-arrow" onclick="goToPhase(${pi - 1})">← ${phases[pi - 1].title.split('—')[0].trim()}</button>` : '<span></span>'}
        ${pi < phases.length - 1 ? `<button class="phase-nav-arrow phase-nav-arrow--next" onclick="goToPhase(${pi + 1})">${phases[pi + 1].title.split('—')[0].trim()} →</button>` : '<span></span>'}
      </div>
    </div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────
function toggleCheck(phaseId, itemIndex) {
  const key = `${phaseId}-${itemIndex}`;
  checked[key] = !checked[key];
  // Auto-advance when all items in the active phase are checked
  const phase = phases[activePhaseIndex];
  const allDone = phase.items.every((_, j) => checked[`${phase.id}-${j}`]);
  if (allDone && activePhaseIndex < phases.length - 1) {
    activePhaseIndex++;
  }
  render();
}

function goToPhase(index) {
  activePhaseIndex = index;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function adjustStat(key, delta) {
  stats[key] = Math.max(0, stats[key] + delta);
  renderStats();
}

function resetTurn() {
  checked = {};
  activePhaseIndex = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showKeyword(kw) {
  const panel = document.getElementById('keyword-panel');
  const name = document.getElementById('kp-name');
  const body = document.getElementById('kp-body');
  const rules = keywords[kw];
  if (!rules) return;
  name.textContent = kw;
  body.innerHTML = rules.map(r => `<div class="rule-line">${r}</div>`).join('');
  panel.classList.add('visible');
}

function closeKeywordPanel() {
  document.getElementById('keyword-panel').classList.remove('visible');
}

// ─── INIT ─────────────────────────────────────────────────
render();
