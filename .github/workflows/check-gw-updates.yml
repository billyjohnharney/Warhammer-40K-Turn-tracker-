name: Check GW Rules Updates

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write   # commit new PDFs
  issues: write     # open alert issues

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run GW PDF checker
        id: checker
        run: |
          python .github/scripts/check_gw_pdfs.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Read summary
        id: summary
        run: |
          if [ -f /tmp/gw_update_summary.json ]; then
            echo "summary=$(cat /tmp/gw_update_summary.json | jq -c .)" >> "$GITHUB_OUTPUT"
          else
            echo 'summary={"new_count":0,"new_pdfs":[]}' >> "$GITHUB_OUTPUT"
          fi

      - name: Commit new PDFs to repository
        if: steps.checker.outputs.exit_code == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rules/
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            SUMMARY='${{ steps.summary.outputs.summary }}'
            COUNT=$(echo "$SUMMARY" | jq '.new_count')
            git commit -m "chore: auto-download ${COUNT} new GW rules PDF(s)

Automatically downloaded by check-gw-updates workflow.
Source: $(echo "$SUMMARY" | jq -r '.checked_url')
Date: $(echo "$SUMMARY" | jq -r '.date')"
            git push origin main
          fi

      - name: Open GitHub Issue for new PDFs
        if: steps.checker.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          NEW_COUNT=$(echo "$SUMMARY" | jq '.new_count')
          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "No new PDFs — skipping issue creation."
            exit 0
          fi

          # Build a markdown list of new PDFs
          PDF_LIST=$(echo "$SUMMARY" | jq -r '.new_pdfs[] | "- **\(.title)** — [\(.url)](\(.url))\n  - Downloaded as: `\(.name)`"')
          DATE=$(echo "$SUMMARY" | jq -r '.date')

          gh issue create \
            --title "📄 GW Rules Update Detected (${DATE}): ${NEW_COUNT} new PDF(s)" \
            --label "rules-update" \
            --body "## New Games Workshop PDFs Detected

The weekly check found **${NEW_COUNT}** new PDF(s) on the GW downloads page.
The file(s) have been automatically downloaded to \`docs/rules/\`.

### New Files
${PDF_LIST}

### Action Required
Review the new document(s) and update the relevant data files in \`src/data/\`:
- [ ] \`phases.js\` — core turn phase rules
- [ ] \`keywords.js\` — weapon/unit keywords
- [ ] \`commandPhaseAbilities.js\` — faction abilities
- [ ] \`pregameSteps.js\` — battle setup steps

After updating, bump the version and date in \`src/data/dataVersion.js\`.

---
*Auto-generated by the [check-gw-updates](${{ github.server_url }}/${{ github.repository }}/actions/workflows/check-gw-updates.yml) workflow.*"

      - name: Open GitHub Issue if scraping failed
        if: steps.checker.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "⚠️ GW Update Check Failed (${DATE}) — Manual Check Required" \
            --label "rules-update" \
            --body "## Automated GW Rules Check Failed

The weekly scraper could not fetch the GW downloads page.
This may be due to a site change, network issue, or bot-blocking.

### Manual Check Required
Please visit the GW downloads page and check for new rules PDFs:
https://www.warhammer-community.com/en-gb/downloads/warhammer-40000/

If new PDFs are found, download them to \`docs/rules/\` and update \`docs/rules/manifest.json\`.

---
*Auto-generated by the [check-gw-updates](${{ github.server_url }}/${{ github.repository }}/actions/workflows/check-gw-updates.yml) workflow.*"
